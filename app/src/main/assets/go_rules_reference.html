
<style>
  h2.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0) }
  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { font-family: var(--font-sans); color: var(--color-text-primary); padding: 1rem 0; max-width: 680px; }
  .toc { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .toc-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all .15s; }
  .toc-btn:hover, .toc-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .section { margin-bottom: 2rem; }
  .sec-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; }
  .sec-num { width: 22px; height: 22px; border-radius: 50%; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); font-size: 11px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); flex-shrink: 0; }
  .rule { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-tertiary); margin-top: 7px; flex-shrink: 0; }
  .rule p { margin: 0; font-size: 14px; line-height: 1.65; color: var(--color-text-primary); }
  .rule strong { font-weight: 500; }
  .callout { border-left: 3px solid; border-radius: 0 6px 6px 0; padding: 10px 14px; margin: 10px 0 12px; font-size: 13px; line-height: 1.6; }
  .callout.info { border-color: #378ADD; background: var(--color-background-info); color: var(--color-text-info); }
  .callout.warn { border-color: #BA7517; background: var(--color-background-warning); color: var(--color-text-warning); }
  .callout.note { border-color: var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .board-demo { display: flex; justify-content: center; margin: 12px 0; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; margin-left: 6px; vertical-align: middle; }
  .tag.diff { background: #E6F1FB; color: #0C447C; }
  .tag.warn { background: #FAEEDA; color: #633806; }
</style>

<div class="wrap">
  <h2 class="sr-only">Complete rules of Go — Chinese ruleset</h2>

  <div class="toc" id="toc"></div>

  <div id="sections"></div>
</div>

<script>
const sections = [
  {
    id: "equipment",
    title: "Equipment & setup",
    rules: [
      { text: "<strong>Board:</strong> Standard play uses a 19×19 grid. 13×13 and 9×9 boards are used for teaching and faster games. The lines form 361 intersections on a 19×19 board." },
      { text: "<strong>Stones:</strong> One player uses black stones, the other uses white stones. Stones are flat and lens-shaped. Each set conventionally contains 181 black and 180 white stones (enough to fill the board)." },
      { text: "<strong>Star points (hoshi):</strong> Nine intersections on a 19×19 board are marked with dots. These serve as visual reference points and as handicap stone placement positions." },
      { text: "<strong>Komi:</strong> Because Black moves first and has a first-move advantage, White receives a points bonus called <em>komi</em>. Under Chinese rules, komi is <strong>7.5 points</strong>. The 0.5 fraction eliminates the possibility of a tie." }
    ]
  },
  {
    id: "objective",
    title: "Objective of the game",
    rules: [
      { text: "The goal is to <strong>control more territory than your opponent</strong>. Territory is defined as empty intersections completely surrounded by one player's stones." },
      { text: "Under Chinese rules specifically, the final score equals <strong>the number of live stones on the board plus the number of empty intersections those stones surround</strong>. Captured stones are not directly deducted from score (unlike Japanese rules)." },
      { text: "The player with the higher score wins. With komi, a score difference of even 0.5 points decides the game — ties are impossible." }
    ]
  },
  {
    id: "placement",
    title: "Placing stones",
    rules: [
      { text: "<strong>Black moves first.</strong> Players alternate turns. On your turn you must either place one stone on any unoccupied intersection, or pass." },
      { text: "Stones are placed on <strong>intersections</strong> (the crossing points of lines), not inside squares." },
      { text: "Once placed, stones <strong>do not move</strong>. They remain on their intersection unless captured." },
      { text: "You may play on any empty intersection subject to the two constraints: the Ko rule and the Suicide rule (see below)." },
      { text: "<strong>Passing:</strong> A player may pass their turn at any time. Passing does not forfeit the game. However, a stone passed under Chinese rules is simply placed in your own territory — captured stones are not exchanged as bowl stones." }
    ]
  },
  {
    id: "liberties",
    title: "Liberties & capture",
    rules: [
      { text: "<strong>Liberties</strong> are the empty intersections directly adjacent (up, down, left, right — never diagonal) to a stone or a connected group of stones." },
      { text: "When all liberties of a stone or group are occupied by the opponent's stones, that stone or group is <strong>captured</strong> and immediately removed from the board." },
      { text: "The capturing player removes the captured stones at the moment of capture (unlike Atari in Shogi — in Go, removal is immediate)." },
      { text: "<strong>Atari</strong> is the state when a stone or group has exactly one liberty remaining — it is in immediate danger of capture. There is no obligation to announce Atari." },
      { text: "<strong>Under Chinese rules, captured stones are kept aside but do NOT count against the capturing player's score</strong>. The score is purely living stones + controlled empty intersections." }
    ],
    callout: { type: "info", text: "Chinese rules differ from Japanese rules here: captured stones do not affect the final score calculation. Only living stones on the board and enclosed empty points count." }
  },
  {
    id: "groups",
    title: "Groups & connectivity",
    rules: [
      { text: "Two stones of the same color that share a common liberty or are connected through a chain of shared liberties form a <strong>group</strong> (also called a string or chain)." },
      { text: "Connectivity is <strong>orthogonal only</strong> — diagonally adjacent stones of the same color are NOT part of the same group." },
      { text: "All stones in a group share the same set of liberties. If any liberty of the group is occupied by an enemy stone, every stone in the group loses that liberty." },
      { text: "A group is captured only when <em>all</em> its liberties are occupied. You cannot partially capture a group." }
    ]
  },
  {
    id: "suicide",
    title: "Suicide rule (self-capture)",
    rules: [
      { text: "You <strong>may not</strong> place a stone on an intersection that would immediately have zero liberties, unless doing so simultaneously captures one or more of the opponent's stones — which would restore at least one liberty." },
      { text: "Under Chinese rules (and most modern rulesets), self-capture (suicide) is <strong>forbidden</strong>. A move that would result in your own stone or group having no liberties — without capturing opponent stones — is illegal." },
      { text: "When a stone is placed and captures enemy stones first, the liberties freed by those captures are computed before checking the placed stone's liberty count. If the capturing gives the placed stone at least one liberty, the move is legal." }
    ],
    callout: { type: "warn", text: "Suicide is illegal under Chinese rules. Always check that your placed stone (or the group it joins) will have at least one liberty after any captures resolve." }
  },
  {
    id: "ko",
    title: "The Ko rule",
    rules: [
      { text: "Ko (劫) prevents an infinite loop. The rule states: <strong>A player may not make a move that returns the board to the exact same position as it was immediately before the opponent's last move.</strong>" },
      { text: "This most commonly occurs in a 'Ko fight' — a specific one-stone pattern where each player could repeatedly recapture the other's stone, cycling indefinitely without Ko." },
      { text: "After a Ko capture, the opponent must play elsewhere (a <em>Ko threat</em>) before recapturing. If there is no suitable Ko threat, the Ko can be abandoned." },
      { text: "<strong>Under Chinese rules (positional superko):</strong> The restriction is broader — no move may recreate <em>any</em> previous board position from the entire game, not just the immediately preceding position. This resolves edge cases in complex multi-Ko situations that basic Ko rules cannot handle." },
      { text: "In practice, the positional superko rule is rarely invoked beyond the simple one-step Ko pattern, but it is the correct rule when resolving unusual cyclic positions like triple Ko, eternal life, or approach-move Ko." }
    ],
    callout: { type: "note", text: "Positional superko (no board position may repeat at any point in the game) is the Chinese rule standard. Japanese rules use only the one-step ko rule, which is why Chinese and Japanese rules occasionally give different results in exotic ko situations." }
  },
  {
    id: "life-death",
    title: "Life & death",
    rules: [
      { text: "A group is <strong>alive</strong> if it cannot be captured regardless of how the opponent plays. A group is <strong>dead</strong> if it cannot avoid eventual capture regardless of how it plays." },
      { text: "<strong>Two eyes:</strong> The most common way to achieve life is for a group to contain two separate internal empty spaces (eyes) that the opponent cannot simultaneously fill. A group with two genuine eyes cannot be captured." },
      { text: "<strong>False eye:</strong> An eye-shaped space is false if the opponent can eventually destroy it by playing on the key intersection that connects the surrounding stones. False eyes do not confer life." },
      { text: "<strong>Seki (mutual life / impasse):</strong> Two opposing groups may share liberties such that neither player can capture the other without first losing their own group. Both groups live without having two eyes. The shared empty intersections between them do <em>not</em> count as territory for either player under Chinese rules." },
      { text: "<strong>Ko life:</strong> A group that can only maintain life through a Ko fight may be ruled dead or alive depending on the outcome of that Ko. Under Chinese rules, if Ko is fought to completion, the outcome determines life/death." },
      { text: "<strong>Bent four in the corner:</strong> Under Chinese rules this is NOT automatically dead — it must be resolved by play, unlike Japanese rules where it is presumed dead. The player with the bent-four group may be able to fight a Ko to live." }
    ]
  },
  {
    id: "endgame",
    title: "End of the game",
    rules: [
      { text: "The game ends when <strong>both players pass consecutively</strong>. This signals that neither player believes any further moves will increase their score." },
      { text: "Before scoring, players must agree on which stones on the board are dead. Dead stones are removed before counting." },
      { text: "If players disagree on the status (dead or alive) of a group, they <strong>resume play</strong> to resolve the dispute. The player claiming a group is dead must prove it by capturing those stones in resumed play; the other player defends." },
      { text: "Under Chinese rules, if play resumes to resolve a life/death dispute, any passes during resumed play do not cost points (unlike Japanese rules where passing in this phase can give points to the opponent)." }
    ]
  },
  {
    id: "scoring",
    title: "Scoring (Chinese area scoring)",
    rules: [
      { text: "<strong>Chinese scoring formula:</strong> Player's score = (number of their living stones on the board) + (number of empty intersections completely surrounded by their stones)." },
      { text: "Captured stones that were removed from the board are <strong>not used in scoring</strong>. Unlike Japanese territory scoring, Chinese rules count stones still on the board rather than prisoner counts." },
      { text: "White's final score has <strong>komi (7.5) added</strong> to it. Black wins if Black's score > White's score + 7.5." },
      { text: "<strong>Dame (neutral points):</strong> Empty intersections that border both colors or that neither player wishes to fill are called dame. Under Chinese rules, dame do not count for either player and are not filled before scoring (though in tournament play, they may be filled to simplify counting)." },
      { text: "<strong>Equivalence with territory scoring:</strong> For a filled board, Chinese area scoring and Japanese territory scoring yield the same winner most of the time. They differ when there are disputes about dame, passes, or bent-four-in-corner situations." },
      { text: "Counting method: In practice, Chinese counting is done by rearranging one player's stones and territory into a rectangular shape for ease of calculation. The total is then compared to 180.5 (half of 361 total points, adjusted for komi)." }
    ],
    callout: { type: "info", text: "Quick check: if Black occupies 181+ points (stones + empty surrounded intersections), Black wins before komi adjustment. With komi of 7.5, Black needs 185 points (out of 361) to guarantee a win against White's 176 + 7.5 = 183.5." }
  },
  {
    id: "handicap",
    title: "Handicap games",
    rules: [
      { text: "Handicap stones allow players of different strengths to play competitively. The weaker player (Black) places extra stones on the board before White makes any move." },
      { text: "Handicap stones are placed on the <strong>star points (hoshi)</strong> in a fixed pattern. On a 19×19 board, standard placement positions are: 2 stones = D4 and Q16; 3 stones = add D16; 4 = add Q4; 5–9 stones add center and side star points in a traditional order." },
      { text: "In a handicap game, <strong>White moves first</strong> (since Black has already 'moved' by placing handicap stones)." },
      { text: "<strong>Komi in handicap games:</strong> When stones are given, komi is typically set to 0.5 (instead of 7.5) to avoid doubly compensating White. Some rulesets use komi of 0 with a half-point tie-break rule added separately." }
    ]
  },
  {
    id: "etiquette",
    title: "Rules of conduct & etiquette",
    rules: [
      { text: "<strong>Resignation:</strong> A player may resign at any time, conceding the game. Resignation is the normal way professional games end. By convention, a player who resigns after a long game should not request to count the score." },
      { text: "<strong>Stone placement:</strong> Stones must be placed decisively with a clean click. In formal play, once a stone touches the board it must be played at that intersection (no adjusting)." },
      { text: "<strong>Review after game:</strong> It is customary (and required in teaching contexts) to replay the game from memory after it ends to discuss key moments. Both players are expected to remember the game." },
      { text: "<strong>Time:</strong> In timed games, a player who exceeds their time limit loses immediately. Byo-yomi (overtime) is common — the player must complete each move within a fixed period (e.g., 30 seconds) or lose." },
      { text: "<strong>No take-backs:</strong> Once placed, a stone cannot be moved or removed by the player who placed it, except as a captured stone by the opponent." }
    ]
  },
  {
    id: "chinese-specific",
    title: "Chinese rules — specific differences",
    rules: [
      { text: "<strong>Area (territory + stones) scoring</strong>, not territory-only scoring. Living stones on the board count." },
      { text: "<strong>Positional superko</strong> — no board position may be repeated at any point in the game (not just the previous move)." },
      { text: "<strong>Bent four in the corner is not automatically dead</strong> — it must be played out." },
      { text: "<strong>Pass stones:</strong> When a player passes, they place a stone of their own color on any empty point in their own territory (or give one to the opponent to place, depending on variation). This ensures that passing has the same scoring effect as making a neutral move, keeping Chinese area scoring and Japanese territory scoring equivalent." },
      { text: "<strong>Suicide is forbidden.</strong> Self-capture moves with no offsetting enemy capture are illegal." },
      { text: "<strong>Komi is 7.5</strong> in Chinese rules for even games at the professional level. Older Chinese rules used 5.5 komi historically." },
      { text: "<strong>No points for captured stones</strong> — prisoners are set aside and do not factor into the score, unlike Japanese rules." }
    ],
    callout: { type: "note", text: "The Chinese ruleset is also called 'area scoring' or 'territory + stones scoring.' It is used by China, most of East Asia outside Japan and Korea, and is increasingly common internationally due to its simplicity in resolving life/death disputes." }
  }
];

const toc = document.getElementById('toc');
const container = document.getElementById('sections');

sections.forEach((sec, i) => {
  const btn = document.createElement('button');
  btn.className = 'toc-btn';
  btn.textContent = sec.title;
  btn.onclick = () => {
    document.getElementById('sec-' + sec.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  toc.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section';
  div.id = 'sec-' + sec.id;

  const heading = document.createElement('div');
  heading.className = 'sec-title';
  heading.innerHTML = `<span class="sec-num">${i+1}</span>${sec.title}`;
  div.appendChild(heading);

  sec.rules.forEach(r => {
    const row = document.createElement('div');
    row.className = 'rule';
    row.innerHTML = `<span class="rule-dot"></span><p>${r.text}</p>`;
    div.appendChild(row);
  });

  if (sec.callout) {
    const c = document.createElement('div');
    c.className = `callout ${sec.callout.type}`;
    c.textContent = sec.callout.text;
    div.appendChild(c);
  }

  container.appendChild(div);
});
</script>
